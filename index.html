  <!-- 
    ★ アプリバージョン（Service Worker キャッシュ自動切替）
    
    【使用方法】
    このバージョン番号を変更するだけで、次回訪問時に自動的に古いキャッシュが削除され
    新バージョンに切り替わります。ユーザーが手動でリロードや再インストールする必要はありません。
    
    【仕組み】
    1. content値を 例）"2026.07.02-1" に変更
    2. Service Worker登録時に「app-version」として sw.js に渡される（URLクエリパラメータ）
    3. sw.js がバージョン番号をキャッシュ名に含める（キャッシュ名: sns-memo-v{VERSION}）
    4. install時に新キャッシュ作成 → activate時に旧キャッシュ名を検出して削除
    5. clients.claim() で即座にページ制御を取得
    6. メインスレッドの controllerchange で自動リロード
    
    【推奨フォーマット】
    YYYY.MM.DD-N （例）2026.07.01-1, 2026.07.01-2, 2026.07.02-1
    
    修整するたびにこの値を更新してください（バージョン番号またはサフィックス -N を +1）。
  -->

<!-- ② CDN依存を排除：IndexedDB直叩きのインライン実装 -->
  <!-- idb-keyval 互換API（get/set/del/keys）をゼロ依存で再実装 -->
  <script>
    (function() {
      const DB_NAME    = "keyval-store";
      const STORE_NAME = "keyval";
      let _db = null;

      function openDB() {
        if (_db) return Promise.resolve(_db);
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
          req.onsuccess = e => { _db = e.target.result; resolve(_db); };
          req.onerror   = e => reject(e.target.error);
        });
      }

      function tx(mode) {
        return openDB().then(db => db.transaction(STORE_NAME, mode).objectStore(STORE_NAME));
      }

      function promisifyReq(req) {
        return new Promise((resolve, reject) => {
          req.onsuccess = () => resolve(req.result);
          req.onerror   = () => reject(req.error);
        });
      }

      window.idbKeyval = {
        get:  (key)       => tx("readonly").then(s  => promisifyReq(s.get(key))),
        set:  (key, val)  => tx("readwrite").then(s => promisifyReq(s.put(val, key))),
        del:  (key)       => tx("readwrite").then(s => promisifyReq(s.delete(key))),
        keys: ()          => tx("readonly").then(s  => promisifyReq(s.getAllKeys())),
      };

      // idbKeyval 準備完了を通知（CDN版と同じイベント名を維持）
      window.dispatchEvent(new Event("idbReady"));
    })();
  </script>

// ==================== [⑤ src/storage/idb.js 相当] ====================
// IndexedDB ストレージ抽象層（Vite移行時は src/storage/idb.js に切り出す）
// ❌ 旧: localStorage は最大5MB・自動削除リスクあり
// ✅ 新: IndexedDB（インライン実装）は大容量・永続性高・PWAに最適

const idb = {
  get: async (key, fallback) => {
    try {
      const v = await window.idbKeyval.get(key);
      return v !== undefined ? v : fallback;
    } catch (e2) { return fallback; }
  },
  set: async (key, val) => {
    try { await window.idbKeyval.set(key, val); } catch (e) {
      // ⚠️ IndexedDB が使えない場合（プライベートブラウジング等）は警告のみ
      console.warn("[SNS Memo] IndexedDB write failed:", key, e);
    }
  },
  del: async (key) => {
    try { await window.idbKeyval.del(key); } catch (e3) {}
  },
};

// 初回マウント用：全キーを非同期でまとめて読み込む
const loadAllData = async () => {
  const [memos, profile, history, theme, extra, draftStructured, draftFree, draftProfile] =
    await Promise.all([
      idb.get("sns_memos", []),
      idb.get("sns_profile", { background: "", target: "", style: "" }),
      idb.get("sns_history", []),
      idb.get("sns_theme", "dark"),
      idb.get("sns_draft_extra", ""),
      idb.get("sns_draft_structured", { event: "", feeling: "", insight: "" }),
      idb.get("sns_draft_free", ""),
      idb.get("sns_draft_profile", null),
    ]);
  return { memos, profile, history, theme, extra, draftStructured, draftFree, draftProfile };
};

// ==================== [修正④] useDebounceEffect：書き込みデバウンス ====================
// タイピング毎のIndexedDB書き込みを防ぐ。300ms停止後に実行。
const useDebounceEffect = (fn, deps, delay = 350) => {
  const fnRef = useRef(fn);
  fnRef.current = fn;
  useEffect(() => {
    const id = setTimeout(() => fnRef.current(), delay);
    return () => clearTimeout(id);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [...deps, delay]);
};

const formatDate = (ts) => {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};

const formatDateShort = (ts) => {
  const d = new Date(ts);
  const now = new Date();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === now.toDateString()) return "今日";
  if (d.toDateString() === yesterday.toDateString()) return "昨日";
  return `${d.getMonth()+1}/${d.getDate()}`;
};

const buildNotePrompt = (memos, extra, profile) => {
  // structured メモは各ラベルを改行区切りで展開、free メモはそのまま
  const netaLines = memos.map(m => {
    if (m.mode === "structured") {
      const parts = [];
      if (m.event?.trim())   parts.push(`【出来事】\n${m.event.trim()}`);
      if (m.feeling?.trim()) parts.push(`【感情】\n${m.feeling.trim()}`);
      if (m.insight?.trim()) parts.push(`【気づき・本質】\n${m.insight.trim()}`);
      return parts.join("\n\n");
    }
    return m.text?.trim() ?? "";
  }).filter(Boolean).join("\n\n---\n\n");

  const profileSection = (profile.background || profile.target || profile.style) ? `
【発信者プロフィール】
${profile.background ? `・背景：${profile.background}` : ""}
${profile.target ? `・ターゲット：${profile.target}` : ""}
${profile.style ? `・スタイル：${profile.style}` : ""}
`.trim() : "";

  return `あなたの役割

あなたは、飾らない言葉で多くの読者の心を掴み、「最後まで読んでしまった」と評価される人気Noteライターです。
読者が「自分もあるな」と自己投影できる、エッセイ風の文章を執筆してください。

執筆手順

1. 【導入】
   ネタの核心に触れる、思わず共感して先を読みたくなる一文から始める。

2. 【展開】
   今日の出来事を、当時の情景やリアルな心の動きが自然に伝わるように描写する。

3. 【深掘り】
   そこから生まれた感情や葛藤を、独白のように自然な流れで掘り下げる。

4. 【本質】
   「気づき・本質」へ無理につなげず、日常の延長線上にある自然な発見として着地させる。小さな気づきで終わってもよい。

5. 【結び】
   読者が自分の経験をふっと思い返したくなるような、余韻のある問いかけで締める。

厳守ルール

・文字数は必ず1000文字以上とする
・見出し（##など）は一切使わず、段落の改行のみで読みやすく構成する
・一文を短めにし、改行を多く使って読みやすくする
・友人に語りかけるような自然な「です・ます調」で書く
・読者への説教、ビジネス用語、テンプレ表現、安易な自己啓発風のまとめは禁止
・無理に感動させようとせず、リアルな感情の揺れを最優先する
・ネタの感情（嬉しい・笑える・切ない・悔しい・あるある・失敗など）に合わせて、文章のトーンやテンポを毎回変える
・導入や展開の順番は必要に応じて入れ替え、毎回同じ構成にならないようにする
・「気づき」は無理に人生論へ広げず、その日の出来事から生まれた自然な発見として描く
・必要に応じて、見えた景色、聞こえた音、空気感、沈黙などの情景描写を織り交ぜ、読者がその場を想像できる文章にする
・具体的なエピソードと心情を中心に書き、抽象論だけで終わらせない
・毎回違う切り口・表現・語彙を使い、AIらしい定型文だと感じさせない文章にする
${profileSection ? "\n" + profileSection : ""}
【今日のネタ】

${netaLines}${extra.trim() ? `\n\n【追加したいこと】\n${extra.trim()}` : ""}`;
};

function CharLimitIndicator({ memos, profile, withImage = false, imageStyle = "illust", emotionLevel = 3, hasHashtag = true, promptText }) {

  // プロンプト長基準のしきい値（固定指示文込みで1000字前後が通常）

  const colors = {
    ok:     { bar: cv("--green"), text: cv("--green"),  label: "✅ プロンプト量：適切" },
    yellow: { bar: "#facc15",     text: "#facc15",       label: "⚠️ プロンプト長め：Claudeへの入力が大きくなります" },
    red:    { bar: cv("--red"),   text: cv("--red"),     label: "🔴 プロンプト過多：内容を絞ることを推奨" },
  };
  const c = colors[risk];

  return (
    React.createElement('div', { style: {
      borderRadius: 8, padding: "8px 12px", marginBottom: 12,
      background: cv("--surface"), border: `1px solid ${cv("--border")}`,
    },}
      , React.createElement('div', { style: { display: "flex", justifyContent: "space-between", marginBottom: 4 },}

      )
      , React.createElement('div', { style: { height: 4, borderRadius: 4, background: cv("--border"), overflow: "hidden" },}
        , React.createElement('div', { style: {

// ==================== [新機能] ErrorBoundary ====================
// ❌ 旧: バックアップJSONが壊れていると画面真っ白（アンハンドルクラッシュ）
// ✅ 新: ErrorBoundaryでキャッチし、リカバリーUIを表示

class ErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("[SNS Memo] ErrorBoundary caught:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        React.createElement('div', { style: {
          minHeight: "100vh", background: "#0f0f11", color: "#f0f0f0",
          display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", padding: 32, textAlign: "center",
        },}
          , React.createElement('div', { style: { fontSize: 40, marginBottom: 16 },}, "⚠️")
          , React.createElement('div', { style: { fontSize: 18, fontWeight: 700, marginBottom: 8 },}, "表示エラーが発生しました")
          , React.createElement('div', { style: { fontSize: 13, color: "#9ca3af", marginBottom: 24, lineHeight: 1.7 },}, "データは保持されています。"
            , React.createElement('br', null ), "ページを再読み込みしてください。"
          )
          , React.createElement('button', { onClick: () => window.location.reload(), style: {
            padding: "12px 32px", background: "#a78bfa", border: "none",
            borderRadius: 10, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer",
          },}, "再読み込み")
          , React.createElement('details', { style: { marginTop: 24, fontSize: 11, color: "#6b6b80", maxWidth: 300 },}
            , React.createElement('summary', null, "エラー詳細")
            , React.createElement('pre', { style: { textAlign: "left", overflowX: "auto", marginTop: 8 },}
              , this.state.error?.message
            )
          )
        )
      );
    }
    return this.props.children;
  }
}

  id: typeof m.id === "number" ? m.id : Date.now() + Math.floor(Math.random() * 1000),

const migrateBackupData = (data, fromVersion) => {
  // version 1（または不明）→ 2：欠損フィールドの補完のみ。実データの破棄は行わない。
  const memos = Array.isArray(data.memos) ? data.memos.map(migrateMemo) : [];
  const profile = (data.profile && typeof data.profile === "object")
    ? {
        background: data.profile.background ?? "",
        target: data.profile.target ?? "",
        style: data.profile.style ?? "",
      }
    : { background: "", target: "", style: "" };
  const history = Array.isArray(data.history)
    ? data.history.map(h => ({
        type: h?.type === "Note" ? "Note" : "X",
        ts: typeof h?.ts === "number" ? h.ts : Date.now(),
        memos: Array.isArray(h?.memos) ? h.memos.map(migrateMemo) : [],
      }))
    : [];
  return { ...data, app: "sns_memo", version: CURRENT_BACKUP_VERSION, memos, profile, history };
};

function SettingsTab({ memos, profile, history, theme, setTheme, onRestore, onEraseAll }) {
  const [confirmErase, setConfirmErase] = useState(false);
  const [restoreMsg,   setRestoreMsg]   = useState("");
  const [showHelp,     setShowHelp]     = useState(false);
  const fileInputRef = useRef(null);

  const handleBackup = () => {
    // ✅ バックアップJSONにアプリバージョンを明記
    const data = { app: "sns_memo", version: 2, exportedAt: Date.now(), memos, profile, history };
    try {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const d    = new Date();
      const fname = `sns_memo_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
      const a = document.createElement("a");
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e4) {}
  };

  const handleFileSelect = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        // ✅ 厳密バリデーション：壊れたJSONでもクラッシュしない
        const raw = String(reader.result);
        let data;
        try { data = JSON.parse(raw); }
        catch (e5) { throw new Error("JSON構文エラー"); }

        if (!data || typeof data !== "object" || data.app !== "sns_memo") {
          throw new Error("SNS Memoのバックアップファイルではありません");
        }
        if (!Array.isArray(data.memos)) throw new Error("memosフィールドが不正です");

        // ✅ [改善] マイグレーション：古いバージョン・フィールド欠損のバックアップでも
        // 現行スキーマ（version: 2）の形に補完してから取り込む。データ破棄を防ぐ。
        const fromVersion = typeof data.version === "number" ? data.version : 1;
        data = migrateBackupData(data, fromVersion);

        // memos の各エントリを検証
        data.memos = data.memos.filter(m =>
          m && typeof m === "object" && typeof m.id === "number" &&
          (m.mode === "structured" || m.mode === "free")
        );

        onRestore(data);
        setRestoreMsg(fromVersion < 2 ? "✓ 旧バージョンのデータを変換して復元しました" : "✓ 復元しました");
      } catch (err) {
        setRestoreMsg(`⚠ 読み込み失敗：${err.message}`);
      }
      setTimeout(() => setRestoreMsg(""), 4000);
    };
    reader.onerror = () => {
      setRestoreMsg("⚠ ファイルの読み込みに失敗しました");
      setTimeout(() => setRestoreMsg(""), 4000);
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const baseBtn = { width: "100%", padding: "13px 0", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: "pointer", minHeight: 44 };

  return (
    React.createElement('div', { style: { padding: 20 },}

      /* ── 使い方ガイドボタン ── */
      , React.createElement(SettingsSection, { title: "📖 使い方ガイド" ,}
        , React.createElement('div', { style: { fontSize: 12, color: cv("--muted"), marginBottom: 12, lineHeight: 1.7 },}, "各タブの機能・基本フローをモックUI付きで解説します。"

        )
        , React.createElement('button', { onClick: () => setShowHelp(true), style: {
          ...baseBtn,
          background: "var(--accent-bg15)", border: `1px solid ${cv("--accent")}66`,
          color: cv("--accent"),
        },}, "使い方ガイドを見る")
      )

      /* ── ヘルプモーダル ── */
      , showHelp && React.createElement(HelpModal, { onClose: () => setShowHelp(false),} )

      , React.createElement(SettingsSection, { title: "① バックアップ（書き出し）" ,}
        , React.createElement('div', { style: { fontSize: 12, color: cv("--muted"), marginBottom: 12, lineHeight: 1.7 },}, "メモ・プロフィール・投稿履歴をJSONファイルとして書き出します。"

        )
        , React.createElement('button', { onClick: handleBackup, style: { ...baseBtn, background: cv("--accent"), border: "none", color: "#fff" },}, "データを書き出す")
      )

      , React.createElement(SettingsSection, { title: "② 復元（読み込み）" ,}
        , React.createElement('div', { style: { fontSize: 12, color: cv("--muted"), marginBottom: 12, lineHeight: 1.7 },}, "書き出したJSONを選んでデータを復元します。現在のデータは上書きされます。"

        )
        , React.createElement('input', { ref: fileInputRef, type: "file", accept: "application/json,.json", onChange: handleFileSelect, style: { display: "none" },} )
        , React.createElement('button', { onClick: () => fileInputRef.current?.click(), style: { ...baseBtn, background: "transparent", border: `1px solid ${cv("--border")}`, color: cv("--sub") },}, "ファイルを選んで復元する")
        , restoreMsg && (
          React.createElement('div', { style: { fontSize: 12, color: restoreMsg.startsWith("✓") ? cv("--green") : cv("--red"), marginTop: 10, lineHeight: 1.6 },}
            , restoreMsg
          )
        )
      )

      , React.createElement(SettingsSection, { title: "③ 表示モード" ,}
        , React.createElement('div', { style: { display: "flex", gap: 8 },}
          , [{ k: "light", l: "☀️ ライト" }, { k: "dark", l: "🌙 ダーク" }].map(({ k, l }) => (

function GenerateTab({ history, extra, setExtra, profile, onCopy, recordPost, onDeleteHistory, onClearHistory }) {
  // ── 合体X用プロンプト設定 ──
  const [withImage,     setWithImage]     = useState(false);

  const [showDeepLinkX, setShowDeepLinkX] = useState(false);

  // ── Note用：履歴から選んだネタで生成 ──
  const [selectedHistoryIdx, setSelectedHistoryIdx] = useState(new Set());
  const [copiedNote,         setCopiedNote]         = useState(false);
  const [showDeepLinkNote,   setShowDeepLinkNote]   = useState(false);

  // ── 履歴の管理（削除） ──
  const [confirmDeleteIdx, setConfirmDeleteIdx] = useState(null);
  const [confirmClear,     setConfirmClear]     = useState(false);

  const countElements = (ml) => ml.reduce((sum, m) => {
    if (m.mode === "structured") return sum + [m.event, m.feeling, m.insight].filter(v => v?.trim()).length;
    return sum + (m.text?.trim() ? 1 : 0);
  }, 0);

  const memoLabel = m =>
    m.mode === "structured"
      ? [m.event, m.feeling, m.insight].filter(Boolean).join(" / ") || "（内容なし）"
      : m.text || "（内容なし）";

  const toggleHistoryIdx = (idx) => setSelectedHistoryIdx(prev => {
    const next = new Set(prev);
    next.has(idx) ? next.delete(idx) : next.add(idx);
    return next;
  });

  const handleDeleteHistory = (idx) => {
    onDeleteHistory(idx);
    // ✅ インデックスがずれるため選択状態はリセットする
    setSelectedHistoryIdx(new Set());
    setConfirmDeleteIdx(null);
  };

  const historyWithIdx = history.map((h, idx) => ({ ...h, _idx: idx })).reverse();
  const historyGrouped = historyWithIdx.reduce((acc, h) => {
    const label = formatDateShort(h.ts);
    if (!acc[label]) acc[label] = [];
    acc[label].push(h);
    return acc;
  }, {});
  const historyGroupOrder = Object.keys(historyGrouped).sort((a, b) => {
    const p = k => k === "今日" ? 0 : k === "昨日" ? 1 : 2;
    if (p(a) !== p(b)) return p(a) - p(b);
    return a < b ? 1 : -1;
  });

  // ✅ 選択した履歴に含まれるネタをまとめる（重複は除外）
  const combinedMemos = useMemo(() => {
    const seen = new Set();
    const result = [];
    history.forEach((h, idx) => {
      if (!selectedHistoryIdx.has(idx)) return;
      h.memos.forEach(m => {
        if (!seen.has(m.id)) { seen.add(m.id); result.push(m); }
      });
    });
    return result;
  }, [history, selectedHistoryIdx]);

  const totalElements = countElements(combinedMemos);
  const noteReady  = totalElements >= 3;
  const remaining  = Math.max(0, 3 - totalElements);

  const xPromptText = useMemo(
    () => buildXPrompt(combinedMemos, profile, withImage, imageStyle, emotionLevel, hasHashtag),
    [combinedMemos, profile, withImage, imageStyle, emotionLevel, hasHashtag]

  const notePromptText = useMemo(
    () => buildNotePrompt(combinedMemos, extra, profile),
    [combinedMemos, extra, profile]

  const handleCopyX = () => {
    if (combinedMemos.length === 0) return;
    onCopy(xPromptText, "gen-x");
    recordPost("X", combinedMemos);
    setCopiedX(true);
    setTimeout(() => setCopiedX(false), 2000);
    setShowDeepLinkX(true);
    setTimeout(() => setShowDeepLinkX(false), 8000);

    setShowDeepLinkNote(true);
    setTimeout(() => setShowDeepLinkNote(false), 8000);

      , React.createElement('div', { style: { fontSize: 11, color: cv("--muted"), marginBottom: 12 },}, "メモタブで追加したネタが日付順に並びます。選んだネタを組み合わせて投稿を作れます"

        },}, "まだ履歴がありません。メモタブでネタを追加すると、ここに記録されます")
      ) : (
        React.createElement('div', { style: { marginBottom: 20 },}
          , React.createElement('div', { style: { fontSize: 12, color: cv("--muted"), marginBottom: 12 },}, "使いたいネタを選んでください"
            , selectedHistoryIdx.size > 0 && (
              React.createElement('span', { style: { marginLeft: 8, background: cv("--accent"), color: "#fff", borderRadius: 20, padding: "1px 8px", fontSize: 11, fontWeight: 700 },}
                , selectedHistoryIdx.size, "件選択中"

            React.createElement('div', { key: label, style: { marginBottom: 16 },}

  useEffect(() => {
    loadAllData().then(data => {
      setMemos(data.memos);
      setProfile(data.profile);
      setHistory(data.history);
      setTheme(data.theme);
      setExtra(data.extra);
      setDrafts({
        structured: data.draftStructured,
        free:       data.draftFree,
        profile:    data.draftProfile,
      });
      applyTheme(data.theme);
      setLoading(false);
    });
  }, []);

  // ✅ CSS変数でテーマを切り替え（再レンダリング不要・全子コンポーネントに即時反映）
  useEffect(() => {
    applyTheme(theme);
    idb.set("sns_theme", theme);
  }, [theme]);

  useDebounceEffect(() => { if (!loading) idb.set("sns_memos",   memos);   }, [memos,   loading]);
  useDebounceEffect(() => { if (!loading) idb.set("sns_profile", profile); }, [profile, loading]);
  useDebounceEffect(() => { if (!loading) idb.set("sns_history", history); }, [history, loading]);
  useDebounceEffect(() => { if (!loading) idb.set("sns_draft_extra", extra); }, [extra, loading]);

  // スマホ戻るボタン対応
  useEffect(() => {
    window.history.replaceState({ tab: "memo" }, "");
    const onPopState = e => { const t = e.state?.tab; if (t) setTab(t); };
    window.addEventListener("popstate", onPopState);
    return () => window.removeEventListener("popstate", onPopState);
  }, []);

  const goTab = (key) => {
    if (key === tab) return;
    setTab(key);
    try { window.history.pushState({ tab: key }, ""); } catch (e6) {}
  };

  // ✅ バックアップ復元：バリデーション済みデータのみ受け入れ
  const handleRestore = (data) => {
    if (Array.isArray(data.memos))                        setMemos(data.memos);
    if (data.profile && typeof data.profile === "object") setProfile(data.profile);
    if (Array.isArray(data.history))                      setHistory(data.history);
  };

  const handleEraseAll = async () => {
    setMemos([]); setProfile({ background: "", target: "", style: "" });
    setHistory([]); setExtra("");

      "sns_memos", "sns_profile", "sns_history", "sns_draft_extra",
      "sns_draft_structured", "sns_draft_free", "sns_draft_profile",

    await Promise.all(keys.map(k => idb.del(k)));
  };

      const el = document.createElement("textarea");
      el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
      document.body.appendChild(el); el.focus(); el.select();
      document.execCommand("copy"); document.body.removeChild(el);

    setCopied(key);

  return (

      , React.createElement('div', { style: {

      )
    )

}


    // アプリをマウント（idbKeyval が準備できてから）

  <!-- Service Worker 登録（バージョン管理・自動キャッシュ切替） -->
  <!-- 
    【フロー】
    1. DOMContentLoaded時に meta[app-version] を読み取る
    2. sw.js?v={VERSION} で登録（URLクエリパラメータにバージョン含める）
    3. SW内で CACHE_NAME = `sns-memo-v${VERSION}` として新キャッシュ作成
    4. install時に旧バージョンのキャッシュを検出・削除
    5. skipWaiting() + clients.claim() で待機中のSWを即座にアクティベート
    6. controllerchange（↓の listeners）で自動リロード
    
    【ユーザー体験】
    - キャッシュ削除のための複雑な操作は不要
    - 再訪問時に自動的に最新版にアップデート
    - 既にインストール済みのPWAもバックグラウンド更新で対応
  -->
  <script>
    if ("serviceWorker" in navigator) {
      const APP_VERSION = document.querySelector('meta[name="app-version"]').content;

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js?v=" + APP_VERSION)
          .then((reg) => {
            console.info("[SW] registered:", APP_VERSION);

            // ページを開いたタイミングで毎回「新しいSWがないか」確認
            reg.update();

            // 新しいSWが見つかって待機状態になったら、即座に有効化を依頼
            reg.addEventListener("updatefound", () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener("statechange", () => {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  // 新バージョンの準備完了 → skipWaitingを促す
                  newWorker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
          })
          .catch(e => console.info("[SW] not registered (ローカルファイルでは無効):", e));

        // 新しいSWがページの制御を握った瞬間 → 古いキャッシュ表示のまま使われないよう自動リロード
        let reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloaded) return;
          reloaded = true;
          console.info("[SW] controllerchange → 自動リロード");
          window.location.reload();
        });
      });
    }
  </script>
